[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --tb=short"
markers = [
    "integration: 실 Postgres가 필요한 통합 테스트 (DATABASE_URL 설정 시에만 실행)",
]

[tool.ruff]
target-version = "py312"
# generate_dummy_data.py는 개발용 더미 데이터 생성 유틸리티다. 앱 코드가 아니고
# 간결한 스크립트 스타일(세미콜론 다중문 등)을 쓰므로 lint 대상에서 제외한다.
extend-exclude = ["generate_dummy_data.py"]
