global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: app
    static_configs:
      - targets: ["app:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
