name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: project-bc9a4402-231d-49bc-a3c
  REGION: asia-northeast3
  AR_REPO: app # Artifact Registry repo name
  IMAGE: career-backend

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/774556382259/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deployer@project-bc9a4402-231d-49bc-a3c.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync compose file and observability config to VM
        run: |
          gcloud compute scp --zone ${REGION}-a --recurse \
            docker-compose.yml observability app-vm:/tmp/deploy-sync

      - name: Deploy on VM via SSH
        run: |
          gcloud compute ssh app-vm --zone ${REGION}-a --command \
            "sudo cp /tmp/deploy-sync/docker-compose.yml /opt/app/docker-compose.yml && \
             sudo cp -r /tmp/deploy-sync/observability/. /opt/app/observability/ && \
             cd /opt/app && sudo docker compose pull && sudo docker compose up -d && sudo docker compose ps" \
            | tee deploy_out.txt

      - name: Send Notifications
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          JOB: Deploy
        run: |
          DETAILS="$(tail -n 20 deploy_out.txt 2>/dev/null)" python3 scripts/notify.py

# TODO(IAM): the gh-deployer service account needs the following roles:
#   - roles/artifactregistry.writer
#   - roles/compute.instanceAdmin.v1
#   - roles/iam.serviceAccountUser
#
# TODO: grant gh-deployer roles/compute.osAdminLogin so `gcloud compute ssh` can run
# sudo docker non-interactively (the CI logs in as a fresh OS Login POSIX user without
# the docker group). The deploy target is a fixed path /opt/app (NOT ~/app -- the CI
# user's home differs from the human's). /opt/app must contain docker-compose.yml, .env,
# and observability/. Also run `sudo gcloud auth configure-docker <region>-docker.pkg.dev`
# on the VM so root's docker can pull from Artifact Registry.
#
# TODO: create the Artifact Registry repo before the first deploy:
#   gcloud artifacts repositories create app --repository-format=docker --location=asia-northeast3
