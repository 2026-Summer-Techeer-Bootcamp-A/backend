name: deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: project-bc9a4402-231d-49bc-a3c
  REGION: asia-northeast3
  AR_REPO: app # Artifact Registry repo name
  IMAGE: career-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/PROJECT_NUM/locations/global/workloadIdentityPools/github-pool/providers/github-provider # TODO: replace PROJECT_NUM with `gcloud projects describe project-bc9a4402-231d-49bc-a3c --format="value(projectNumber)"`
          service_account: gh-deployer@project-bc9a4402-231d-49bc-a3c.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}"
          docker build -t "$IMAGE_URI:${GITHUB_SHA}" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:${GITHUB_SHA}"
          docker push "$IMAGE_URI:latest"

      - name: Deploy on VM via SSH
        run: |
          gcloud compute ssh app-vm --zone ${REGION}-a --command "cd ~/app && docker compose pull && docker compose up -d"

# TODO(IAM): the gh-deployer service account needs the following roles:
#   - roles/artifactregistry.writer
#   - roles/compute.instanceAdmin.v1
#   - roles/iam.serviceAccountUser
