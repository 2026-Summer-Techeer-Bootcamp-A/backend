# Local dev override. Used together with docker-compose.yml.
# With COMPOSE_FILE set in .env, `docker compose up -d --build` brings up the
# FULL local stack: app + db + redis + prometheus + loki + alloy + tempo + grafana.
services:
  # Override the base app: wait for db/redis, mount source for live reload + seed access.
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ../gh-hn-data-collector/collector:/opt/collector
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    build: ./db
    image: career-backend-db:local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # postgres-exporter/redis-exporter/node-exporter는 docker-compose.yml(base)로
  # 옮겼다. 프로덕션 배포가 base 파일만 동기화하는데 이 3개가 dev 전용 파일에만
  # 있어서 프로덕션 Grafana의 시스템/DB 대시보드가 계속 비어 있었기 때문이다.

volumes:
  pgdata:
  redisdata:
