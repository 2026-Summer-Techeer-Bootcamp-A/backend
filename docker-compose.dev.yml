# Local dev override. Used together with docker-compose.yml.
# With COMPOSE_FILE set in .env, `docker compose up -d --build` brings up the
# FULL local stack: app + db + redis + prometheus + loki + alloy + tempo + grafana.
services:
  # Override the base app: wait for db/redis, mount source for live reload + seed access.
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ../gh-hn-data-collector/collector:/opt/collector
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    build: ./db
    image: career-backend-db:local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- Exporters (local observability) ---
  # Postgres metrics (pg_stat_*, pg_locks, per-table stats) for the DB dashboard.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-appdb}?sslmode=disable"
    command:
      - "--collector.stat_user_tables"
      - "--collector.stat_activity_autovacuum"
      - "--collector.long_running_transactions"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Redis metrics (memory, ops/sec, hits/misses, connected clients).
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Host-level metrics (CPU, memory, disk, network, load) for the System dashboard.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
