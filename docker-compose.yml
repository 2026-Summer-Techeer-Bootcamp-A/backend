x-logging: &default-logging
  # 컨테이너 로그가 무한정 쌓이는 걸 막는다. 이게 없으면 디스크가 차거나,
  # loki.source.docker가 첫 수집 시 쌓인 과거 로그를 한꺼번에 밀어넣어
  # Loki의 수신 한도를 넘기기 쉽다.
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build: .
    image: ${APP_IMAGE:-career-backend:local}
    # uvicorn 워커는 (2*cores)+1 공식(동기 워커용)이 아니라 vCPU 수에 맞춘다 — 워커
    # 하나가 이미 비동기 이벤트 루프라 I/O 바운드 요청은 워커 하나로도 동시 처리가
    # 되고, 워커를 늘리는 건 CPU 코어를 나눠 쓰기 위함이다. 이 VM은 4 vCPU를 uvicorn
    # 뿐 아니라 Traefik/Prometheus/Loki/Tempo/Grafana/Alloy와도 나눠 쓰므로 9는
    # 과할당이었다(부하 테스트 중 CPU 오버섭스크립션으로 확인됨). 워커 수가 줄면
    # 워커당 pool_size=30인 SQLAlchemy 커넥션 풀의 최대 총량(workers*40)도 같이
    # 줄어 2 vCPU짜리 DB(db-custom-2-7680) 부담도 낮아진다.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - HF_HOME=/models
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - model-cache:/models
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=myresolver"
      - "traefik.http.services.app.loadbalancer.server.port=8000"

  # 부하테스트로 확인된 병목: 워커 4개 × pool_size 40 = 최대 160개의 실제
  # Postgres 백엔드 프로세스가 2 vCPU DB에 동시에 몰리면, CPU 사용률 자체는
  # 낮아도(50%대) 컨텍스트 스위칭 경합으로 지연이 크게 늘었다(pg_stat_activity의
  # active 세션이 116~121까지 치솟는 걸 직접 관측). PgBouncer를 트랜잭션 풀링
  # 모드로 앞에 두면, 앱은 지금처럼 많은 커넥션을 유지해도 실제 Postgres 백엔드
  # 수는 DEFAULT_POOL_SIZE만큼만 유지되어 이 경합이 사라진다. app의 DATABASE_URL을
  # Cloud SQL 대신 이 서비스(pgbouncer:6432)로 돌려야 효과가 있다.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    restart: unless-stopped
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - POOL_MODE=transaction
      # app<->pgbouncer는 docker 내부 네트워크로만 오가 외부에 노출되지 않는다.
      # scram-sha-256으로 두면 userlist.txt에 해시만 저장되어 pgbouncer가 그
      # 값으로는 Cloud SQL과 SCRAM 핸드셰이크를 못 끝낸다(wrong password type).
      # plain으로 평문 비밀번호를 들고 있어야 서버 쪽 SCRAM을 pgbouncer가 대신
      # 완료할 수 있다.
      - AUTH_TYPE=plain
      # 앱 쪽 이론상 최대(워커 4 × 40)보다 여유 있게 잡는다.
      - MAX_CLIENT_CONN=300
      # 실제 Postgres 백엔드로 나가는 연결 수 상한. 2 vCPU에서 컨텍스트 스위칭
      # 경합 없이 처리 가능한 수준으로 낮게 잡는다(추후 실측 기반으로 조정).
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
    logging: *default-logging

  traefik:
    image: traefik:v3.0
    command:
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certificates:/letsencrypt"
    restart: unless-stopped
    logging: *default-logging


  prometheus:
    image: prom/prometheus:v3.2.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    logging: *default-logging

  loki:
    image: grafana/loki:3.4.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: unless-stopped
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.7.1
    command: run /etc/alloy/config.alloy
    volumes:
      - ./observability/config.alloy:/etc/alloy/config.alloy
      - /var/log:/var/log:ro
      # 컨테이너 로그(app, db 등) 수집을 위해 도커 소켓을 읽기 전용으로 마운트.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    logging: *default-logging

  tempo:
    image: grafana/tempo:2.7.1
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-change-me}
      - GF_SERVER_ROOT_URL=https://grafana.2026-techeer-a.duckdns.org
      # Discord 알림 컨택포인트가 $__env{DISCORD_WEBHOOK_URL}로 이 값을 읽는다.
      # 빈 문자열이면 Grafana 11.5.2가 컨택포인트 검증에서 fatal error로 죽고
      # 재시작 루프에 빠진다(빈 url은 "조용히 실패"가 아니라 provisioning
      # 자체를 막는다). 실제 webhook이 없을 때도 뜨도록 형식만 유효한
      # placeholder를 기본값으로 둔다 — 알림 전송은 여전히 실패하지만(의도한
      # "조용한 실패"), Grafana 프로세스는 죽지 않는다.
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-https://discord.com/api/webhooks/0/placeholder}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.2026-techeer-a.duckdns.org`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # 아래 3개는 예전엔 docker-compose.dev.yml(로컬 전용)에만 있었다. deploy.yml이
  # docker-compose.yml만 VM에 동기화하다 보니 프로덕션엔 이 exporter들이 존재한
  # 적이 없었고, prometheus.yml의 postgres-exporter/node-exporter 스크레이프
  # job이 조용히 데이터 없이 비어서 "시스템 성능"/"DB 내용" 대시보드가 프로덕션
  # 에서만 비어 보이는 원인이 됐다(로컬은 dev.yml이 db/redis 컨테이너를 같이
  # 띄워서 정상 동작했음). DSN을 db/redis 컨테이너 호스트명으로 하드코딩하지
  # 않고 환경별 .env의 POSTGRES_EXPORTER_DSN/REDIS_EXPORTER_ADDR로 분리한 이유는
  # 프로덕션이 컨테이너 DB가 아니라 Cloud SQL/Memorystore를 프라이빗 IP로 직접
  # 붙기 때문이다.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN}
    command:
      - "--collector.stat_user_tables"
      - "--collector.stat_activity_autovacuum"
      - "--collector.long_running_transactions"
    restart: unless-stopped
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: ${REDIS_EXPORTER_ADDR}
    restart: unless-stopped
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host
    restart: unless-stopped
    logging: *default-logging

volumes:
  traefik-certificates:
  model-cache:
